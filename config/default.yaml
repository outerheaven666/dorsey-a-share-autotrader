scoring:
  quality_weight: 0.35
  moat_weight: 0.30
  valuation_weight: 0.25
  risk_weight: 0.10

portfolio:
  max_positions: 20
  max_stock_weight: 0.05
  max_industry_weight: 0.25
  cash_reserve: 0.05

transaction_cost:
  commission_rate: 0.0003
  minimum_commission: 5
  stamp_duty_rate: 0.0005
  slippage_rate: 0.001

backtest:
  initial_cash: 1000000
  rebalance_frequency: quarterly
  benchmark_symbol: ""
  risk_free_rate: 0.0

data_quality:
  stale_days_threshold: 450
  severe_stale_days_threshold: 900
  allow_stale_warning: true
  block_on_missing_core_fields: true
  block_on_lookahead_bias: true
  block_on_severe_outlier: true

report:
  output_format:
    - markdown
    - html
  include_data_quality_summary: true
  include_top_scores: true
  include_trade_summary: true
  include_backtest_metrics: true
  include_holdings_snapshot: true
  include_equity_curve_chart: true
  include_drawdown_chart: true
  include_trade_table: true
  include_holdings_table: true
  include_data_quality_table: true
  include_audit_summary: true

notify:
  enabled: false
  mode: dry_run
  channel: feishu
  webhook_url_env: FEISHU_WEBHOOK_URL
  write_payload_to_file: true

audit:
  enabled: true
  include_score_decisions: true
  include_portfolio_decisions: true
  include_backtest_decisions: true
  include_rejected_trades: true
  include_data_quality_issues: true

data_source:
  mode: local_csv
  provider: sample_csv
  allow_network: false
  require_point_in_time: true
  require_disclosure_date: true
  trading_calendar_path: data/sample/trading_calendar.csv
  stock_basic_path: data/sample/stock_basic.csv
  financial_snapshot_path: data/sample/financial_snapshot.csv
  market_snapshot_path: data/sample/market_snapshot.csv
  historical_market_snapshot_path: data/sample/historical_market_snapshot.csv

point_in_time:
  enabled: true
  as_of_date: 2026-06-14
  exclude_undisclosed_financials: true
  block_on_future_disclosure: true
  max_financial_lag_days: 540

factor_audit:
  enabled: true
  include_component_scores: true
  include_raw_inputs: true
  include_normalized_values: true
  include_red_flag_reasons: true
  include_moat_proxy_reasons: true
  include_valuation_reasons: true

schema_validation:
  enabled: true
  block_on_missing_required_columns: true
  block_on_invalid_numeric_fields: true
  block_on_duplicate_keys: true
  warn_on_extra_columns: true

adapter_contract:
  enabled: true
  mode: mock_only
  allow_network: false
  allow_real_provider: false
  provider: mock_a_share
  contract_version: v1
  fixture_dir: data/fixtures/mock_provider
  output_dir: data/output

field_mapping:
  enabled: true
  strict_required_fields: true
  allow_extra_fields: true
  normalize_symbol: true
  normalize_dates: true

provider_tests:
  enabled: true
  require_stock_basic: true
  require_financial_snapshot: true
  require_market_snapshot: true
  require_historical_market_snapshot: true
  require_trading_calendar: true
  block_on_contract_failure: true

schema_versioning:
  enabled: true
  current_version: v1
  schema_dir: config/schemas
  baseline_contract: config/schemas/provider_contract_v1.yaml
  candidate_contract: config/schemas/provider_contract_candidate.yaml
  block_on_breaking_change: true
  warn_on_additive_change: true
  allow_documented_extra_fields: true

contract_diff:
  enabled: true
  output_dir: data/output
  compare_required_fields: true
  compare_field_types: true
  compare_date_fields: true
  compare_numeric_fields: true
  compare_boolean_fields: true
  compare_dataset_presence: true

provider_templates:
  enabled: true
  real_provider_templates_enabled: false
  templates_are_non_executable: true

schema_migration:
  enabled: true
  current_version: v1
  target_version: v1_1
  migration_dir: config/schema_migrations
  migration_plan: config/schema_migrations/v1_to_v1_1.yaml
  compatibility_window_days: 180
  block_on_expired_deprecation: true
  block_on_missing_migration_plan: true
  warn_on_pending_deprecation: true
  allow_backward_compatible_aliases: true

contract_visualization:
  enabled: true
  output_dir: data/output
  generate_html: true
  generate_markdown: true
  include_dataset_summary: true
  include_field_lifecycle: true
  include_migration_steps: true
  include_breaking_change_table: true
  include_additive_change_table: true
  include_compatibility_matrix: true

pre_live_safety:
  enabled: true
  default_mode: research_only
  allowed_modes:
    - research_only
    - paper
    - backtest
    - dry_run
  forbidden_modes:
    - live
    - real_broker
    - real_order
  require_manual_confirmation: true
  require_read_only_first: true
  require_schema_validation: true
  require_provider_contract_validation: true
  require_contract_diff_check: true
  require_schema_migration_check: true
  require_data_quality_check: true
  require_point_in_time_check: true
  require_factor_audit_check: true
  require_backtest_before_paper: true
  require_paper_before_live: true
  block_live_trading: true
  block_real_broker: true
  block_real_network_provider: true
  block_missing_audit_log: true
  block_missing_safety_ack: true
  safety_ack_phrase: "I understand this system is research-only and live trading is disabled"
  output_dir: data/output

execution_policy:
  mode: research_only
  allow_live_trading: false
  allow_real_broker: false
  allow_real_orders: false
  allow_real_network_data: false
  allow_dry_run_notify: true
  allow_paper_trading: true
  allow_backtest: true
  allow_local_csv: true
  allow_mock_provider: true

system_health:
  enabled: true
  output_dir: data/output
  release_version: v0.11.0
  require_clean_worktree: false
  check_gitignore_outputs: true
  check_sensitive_patterns: true
  check_forbidden_imports: true
  check_forbidden_keywords: true
  check_config_safety_flags: true
  check_required_cli_outputs: true
  check_reports_exist: true
  check_mock_provider_only: true
  check_no_live_trading: true
  check_no_real_broker: true
  check_no_real_network_data: true

release_checklist:
  enabled: true
  output_dir: data/output
  release_version: v0.11.0
  require_pytest_passed: true
  require_health_check_passed: true
  require_pre_live_safety_passed: true
  require_contract_diff_passed: true
  require_schema_migration_passed: true
  require_provider_contract_passed: true
  require_data_quality_passed: true
  require_backtest_passed: true
  require_reports_generated: true
  require_no_sensitive_strings: true
  require_no_data_output_tracked: true
  generate_release_notes: true

sensitive_scan:
  enabled: true
  scan_paths:
    - README.md
    - config
    - data/fixtures
    - src
    - tests
  forbidden_patterns:
    - token=
    - secret=
    - password=
    - webhook_url=
    - credential=
    - broker_password
    - access_key
    - api_key
  forbidden_provider_keywords:
    - AkShare
    - Tushare
    - Wind
    - Choice
    - JQData
    - QMT
    - PTrade
  allow_documentation_mentions: true
